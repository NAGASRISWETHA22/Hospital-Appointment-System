spring.application.name=hospital-backend

spring.datasource.url=${DB_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=UTC}}
spring.datasource.username=${DB_USER:${DATABASE_USERNAME:root}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD:password}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Port (Render sets $PORT)
server.port=${PORT:9090}

# Swagger/OpenAPI Path
springdoc.swagger-ui.path=/swagger-ui.html
