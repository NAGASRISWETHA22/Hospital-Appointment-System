spring.application.name=hospital-backend

# Database
spring.datasource.url=jdbc:mysql://mysql-201dc059-hospital-managesment-system.e.aivencloud.com:12929/defaultdb?ssl-mode=REQUIRED&useSSL=true&trustServerCertificate=true
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - Dialect updated to latest version
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=${PORT:8080}

# Security Fix for the Bean error you had earlier
spring.main.allow-bean-definition-overriding=true

# Swagger/OpenAPI Path
springdoc.swagger-ui.path=/swagger-ui.html
